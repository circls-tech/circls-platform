openapi: 3.0.3
info:
  title: Circls Platform API
  description: >-
    Circls public + internal API. `/v1/*` is the Firebase-auth internal API used by the admin/partners portals.
    `/api/v1/*` is the aggregator API authenticated with a Circls API key (Bearer ck_…).
  version: 0.1.0
components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
      description: Firebase ID token from the partner portal sign-in.
    apiKey:
      type: http
      scheme: bearer
      bearerFormat: ck_… key
      description: Circls API key issued under /v1/tenants/:tenantId/api-keys.
  schemas: {}
