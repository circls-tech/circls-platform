name: Release tracker

# Maintains ONE rolling "🚀 Release tracker" issue showing release..main: the
# commits that would ship, the migrations in the batch, and how to ship. Updated
# every morning AND on every push to main, so it's current within minutes.
# Deploys nothing. Safe before the release branch exists (skips gracefully).
on:
  schedule:
    - cron: '30 2 * * *' # 08:00 IST
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: release-tracker
  cancel-in-progress: true

jobs:
  tracker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Build release notes (release..main)
        id: notes
        run: |
          set -euo pipefail
          git fetch origin main --tags
          if ! git fetch origin release 2>/dev/null || ! git rev-parse --verify --quiet origin/release >/dev/null; then
            echo "release branch not created yet — skipping tracker." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE=$(git rev-parse origin/release)
          HEAD=$(git rev-parse origin/main)
          node scripts/release/release-notes.mjs "$BASE" "$HEAD" > notes.md
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

      - name: Upsert the rolling tracker issue
        if: steps.notes.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ steps.notes.outputs.head }}
        with:
          script: |
            const fs = require('fs');
            const head = process.env.HEAD_SHA;
            const body = fs.readFileSync('notes.md', 'utf8') +
              `\n\n---\n**To ship:** Actions → **Release** → Run workflow ` +
              `(target defaults to \`main\` tip \`${head.slice(0, 7)}\`).\n` +
              `**To roll back:** Actions → **Rollback** → Run workflow (defaults to \`lkg\`).`;
            const TITLE = '🚀 Release tracker';
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'release-candidate',
            });
            const mine = open.data.find((i) => i.title === TITLE);
            if (mine) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: mine.number, body,
              });
              core.info(`Updated rolling tracker #${mine.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: TITLE, body, labels: ['release-candidate'],
              });
              core.info(`Created rolling tracker #${created.data.number}`);
            }
