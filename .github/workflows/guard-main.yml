name: Guard main

# Soft enforcement of "no direct pushes to main" for as long as the repo is on a
# GitHub plan without branch protection (Pro is required for private repos).
# Runs on every push to main; if the pushed commit did NOT arrive via a pull
# request, it opens a loud alert issue. It cannot BLOCK the push — that needs the
# `protect-main` ruleset (scripts/release/protect-main.sh), which needs GitHub Pro.

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Alert if this commit did not arrive via a pull request
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const head = context.payload.head_commit || {};
            const message = head.message || '';
            // The "PRs associated with a commit" API covers squash/rebase merges (the
            // landed commit belongs to the PR), but returns EMPTY for a merge-commit
            // strategy (the merge commit isn't part of the PR branch). GitHub formats
            // those as "Merge pull request #N from …", so accept that as a PR signal too.
            const isPrMergeCommit = /^Merge pull request #\d+ /.test(message);
            if (prs.length > 0 || isPrMergeCommit) {
              core.info(`OK: ${sha.slice(0, 7)} arrived via PR${prs.length ? ` #${prs[0].number}` : ' (merge commit)'}.`);
              return;
            }
            const firstLine = message.split('\n')[0];
            core.warning(`Direct push to main detected: ${sha.slice(0, 7)} has no associated PR.`);
            const title = `🔴 Direct push to main detected (${sha.slice(0, 7)})`;
            const body = [
              `Commit \`${sha}\` was pushed directly to \`main\` — not through a pull request.`,
              '',
              `- Author: ${head.author?.name ?? 'unknown'}`,
              `- Message: ${firstLine}`,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'All changes to `main` must go through a PR with green CI (see `docs/CONTRIBUTING.md`).',
              'If this was an emergency, open a retroactive PR or revert the commit.',
              '',
              '_Detect-only: enabling the `protect-main` ruleset (GitHub Pro) turns this into a hard block._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['main-guard'],
            });
