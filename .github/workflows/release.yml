name: Release

# The go/no-go. Operator-triggered. Pre-flights (target on main + CI green + prod healthy),
# fast-forwards `release` to the target SHA and pushes (Coolify deploys on that push),
# tags release-<date>.N, then verifies the live build SHA + smoke probes, and moves `lkg`.
#
# SECURITY: never inline a `${{ }}` expression (esp. a dispatch input) directly inside a
# `run:`/`script:` body — it is spliced into the source before the shell/JS sees it, which is
# a command-injection vector. All such values are passed via `env:` and read as `$VAR` /
# `process.env.VAR`. (`steps.target.outputs.sha` is a git-rev-parse'd 40-hex string, but we
# pass it through env too so the workflow has zero inline expansions in run/script bodies.)
#
# CONCURRENCY: this shares `group: release-prod` with rollback.yml ON PURPOSE — a release and
# a rollback both push `release`, so they must be mutually exclusive. Keep the group name in
# sync across both workflows.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'main SHA to release (blank = current main tip)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  checks: read # the CI-green pre-flight reads check-runs via `gh api .../check-runs`

concurrency:
  group: release-prod
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    env:
      REQUIRED_CHECKS: 'verify,db'
      HEALTH_URL: 'https://api.circls.app/v1/health'
      PORTAL_URLS: 'https://admin.circls.app,https://partners.circls.app,https://circls.app'
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push to the ruleset-protected `release` branch as VedantS01 (a bypass
          # actor) instead of github-actions[bot] (which the protect-release ruleset
          # blocks). persist-credentials keeps this token for the later git pushes.
          token: ${{ secrets.RELEASE_DEPLOY_TOKEN }}
          persist-credentials: true

      - name: Resolve target SHA
        id: target
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          git fetch origin main release --tags || git fetch origin main --tags
          SHA="$INPUT_SHA"
          if [ -z "$SHA" ]; then SHA=$(git rev-parse origin/main); fi
          SHA=$(git rev-parse "$SHA")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          PREV=$(git rev-parse --verify --quiet origin/release || true)
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          echo "Target SHA: $SHA"

      - name: Pre-flight — target is on main and fast-forward from release
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$TARGET_SHA" origin/main \
            || { echo "::error::Target $TARGET_SHA is not an ancestor of main"; exit 1; }
          if git rev-parse --verify --quiet origin/release >/dev/null; then
            git merge-base --is-ancestor origin/release "$TARGET_SHA" \
              || { echo "::error::Not a fast-forward from release — use Rollback to move backwards"; exit 1; }
          fi

      - name: Pre-flight — CI is green on the target SHA
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          # Poll until every required check completes rather than failing immediately on
          # in-progress checks (fixes the timing race when a release is triggered shortly
          # after the merge, before CI has finished on that commit).
          #   exit 0 from check-ci.mjs = all required checks green       → proceed
          #   exit 1 from check-ci.mjs = a required check concluded bad   → abort now
          #   exit 2 from check-ci.mjs = required check(s) still running  → wait and retry
          DEADLINE=$(( $(date +%s) + 900 ))  # 15-minute wait budget
          while true; do
            gh api "repos/$GITHUB_REPOSITORY/commits/$TARGET_SHA/check-runs" > checks.json
            CODE=0
            node scripts/release/check-ci.mjs < checks.json || CODE=$?
            if [ "$CODE" -eq 0 ]; then
              echo "All required checks are green — proceeding."
              break
            elif [ "$CODE" -eq 1 ]; then
              echo "::error::A required check has failed — refusing to release."
              exit 1
            else
              # exit 2: one or more required checks are still queued / in-progress
              NOW=$(date +%s)
              if [ "$NOW" -ge "$DEADLINE" ]; then
                echo "::error::Timed out after 15 minutes waiting for required checks to complete."
                exit 1
              fi
              REMAINING=$(( DEADLINE - NOW ))
              echo "Required checks still in progress — retrying in 15 s (${REMAINING}s left)..."
              sleep 15
            fi
          done

      - name: Pre-flight — prod is currently healthy
        run: |
          set -euo pipefail
          curl -fsS "$HEALTH_URL" | tee /dev/stderr | grep -qE '"ok"[[:space:]]*:[[:space:]]*true' \
            || { echo "::error::Prod health check failed before release"; exit 1; }

      - name: Flag migrations in this batch
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          if git rev-parse --verify --quiet origin/release >/dev/null; then BASE=$(git rev-parse origin/release); else BASE="$TARGET_SHA^"; fi
          MIGS=$(node scripts/release/detect-migrations.mjs "$BASE" "$TARGET_SHA" || true)
          if [ -n "$MIGS" ]; then
            echo "::warning::This release runs migrations on deploy:"; echo "$MIGS"
          else
            echo "No migrations in this batch."
          fi

      - name: Deploy — fast-forward release and push (triggers Coolify)
        id: deploy
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          git push origin "$TARGET_SHA:refs/heads/release"
          DATE=$(date -u +%Y-%m-%d)
          TAG=$(git tag -l "release-$DATE.*" | DATE="$DATE" node scripts/release/release-tag.mjs)
          git tag "$TAG" "$TARGET_SHA"
          git push origin "refs/tags/$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Released $TARGET_SHA as $TAG"

      - name: Verify — wait for live build SHA + smoke probes
        env:
          EXPECTED_SHA: ${{ steps.target.outputs.sha }}
        run: node scripts/release/smoke.mjs

      - name: Mark last-known-good
        if: success()
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          git tag -f lkg "$TARGET_SHA"
          # A failed tag push must not masquerade as a failed deploy — the release already
          # succeeded and `release` is pushed. Warn instead of failing the job.
          git push -f origin refs/tags/lkg || echo "::warning::lkg tag push failed; the release itself succeeded"
          echo "lkg → $TARGET_SHA"

      - name: Update the rolling release tracker
        if: success()
        uses: actions/github-script@v7
        env:
          DEPLOY_TAG: ${{ steps.deploy.outputs.tag }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        with:
          script: |
            const TITLE = '🚀 Release tracker';
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'release-candidate',
            });
            const issue = open.data.find((i) => i.title === TITLE);
            if (!issue) { core.info('No rolling tracker to update.'); return; }
            const tag = process.env.DEPLOY_TAG;
            const sha = process.env.TARGET_SHA;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
              body: `✅ Released \`${tag}\` (\`${sha.slice(0, 7)}\`). lkg updated.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
              body: `Nothing pending release as of \`${tag}\` (\`${sha.slice(0, 7)}\`).\n\nThe next push to \`main\` will repopulate this tracker.`,
            });

      - name: Post release notes to Teams
        if: success()
        uses: actions/github-script@v7
        env:
          DEPLOY_TAG: ${{ steps.deploy.outputs.tag }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          PREV_RELEASE: ${{ steps.target.outputs.prev }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        with:
          script: |
            if (!process.env.TEAMS_WEBHOOK_URL) { core.warning('TEAMS_WEBHOOK_URL not set — skipping release notes.'); return; }
            const { execFileSync } = require('node:child_process');
            const target = process.env.TARGET_SHA;
            const prev = process.env.PREV_RELEASE;
            const base = prev && prev.length ? prev : `${target}^`;
            let notes = '';
            try {
              notes = execFileSync('node', ['scripts/release/release-notes.mjs', base, target], { encoding: 'utf8' });
            } catch (e) {
              core.warning(`release-notes generation failed: ${e.message}`);
              notes = '_(release notes unavailable)_';
            }
            const text = `**✅ Released \`${process.env.DEPLOY_TAG}\`**\n\n${notes}`;
            const card = {
              type: 'message',
              attachments: [{
                contentType: 'application/vnd.microsoft.card.adaptive',
                content: {
                  type: 'AdaptiveCard', version: '1.4',
                  $schema: 'http://adaptivecards.io/schemas/adaptive-card.json',
                  body: [{ type: 'TextBlock', wrap: true, text }],
                },
              }],
            };
            const res = await fetch(process.env.TEAMS_WEBHOOK_URL, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card),
            });
            if (!res.ok) core.warning(`Teams release-notes POST failed: ${res.status} ${await res.text()}`);
            else core.info('Release notes posted to Teams.');

      - name: Mark shipped items Released on the project board
        if: success()
        env:
          PROJECT_NUMBER: '1'
        uses: actions/github-script@v7
        with:
          # Needs a token with org project write — the RELEASE_DEPLOY_TOKEN PAT
          # (classic, with the `project` scope). The default GITHUB_TOKEN can't
          # write org-level Projects. Board update is best-effort: a delivered
          # release is never failed for a board hiccup (warn, don't setFailed).
          github-token: ${{ secrets.RELEASE_DEPLOY_TOKEN }}
          script: |
            const org = context.repo.owner;
            const number = parseInt(process.env.PROJECT_NUMBER, 10);
            let meta;
            try {
              meta = await github.graphql(`
                query($org:String!, $number:Int!){
                  organization(login:$org){
                    projectV2(number:$number){
                      id
                      field(name:"Status"){ ... on ProjectV2SingleSelectField { id options { id name } } }
                    }
                  }
                }`, { org, number });
            } catch (e) { core.warning(`Project lookup failed: ${e.message}`); return; }
            const project = meta.organization && meta.organization.projectV2;
            if (!project || !project.field) { core.warning('Project or Status field not found — skipping board update.'); return; }
            const ready = project.field.options.find((o) => o.name === 'Ready to release');
            const released = project.field.options.find((o) => o.name === 'Released');
            if (!ready || !released) { core.warning('Ready to release / Released options not found — skipping.'); return; }
            // Best-effort: never fail a delivered release for a board hiccup.
            try {
              const toMove = [];
              let cursor = null;
              do {
                const page = await github.graphql(`
                  query($id:ID!, $cursor:String){
                    node(id:$id){ ... on ProjectV2 { items(first:100, after:$cursor){
                      pageInfo{ hasNextPage endCursor }
                      nodes{ id fieldValueByName(name:"Status"){ ... on ProjectV2ItemFieldSingleSelectValue { optionId } } }
                    } } }
                  }`, { id: project.id, cursor });
                const conn = page.node.items;
                for (const it of conn.nodes) {
                  if (it.fieldValueByName && it.fieldValueByName.optionId === ready.id) toMove.push(it.id);
                }
                cursor = conn.pageInfo.hasNextPage ? conn.pageInfo.endCursor : null;
              } while (cursor);
              for (const itemId of toMove) {
                await github.graphql(`
                  mutation($project:ID!, $item:ID!, $field:ID!, $option:String!){
                    updateProjectV2ItemFieldValue(input:{ projectId:$project, itemId:$item, fieldId:$field, value:{ singleSelectOptionId:$option } }){ projectV2Item { id } }
                  }`, { project: project.id, item: itemId, field: project.field.id, option: released.id });
              }
              core.info(`Moved ${toMove.length} item(s) from "Ready to release" to "Released".`);
            } catch (e) {
              core.warning(`Board update failed (release still succeeded): ${e.message}`);
            }

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        with:
          script: |
            const sha = process.env.TARGET_SHA || 'unknown';
            const shortSha = sha === 'unknown' ? sha : sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `🔴 Release failed (${shortSha})`,
              body: [
                `Release of \`${sha}\` failed at a verification step. Prod may be mid-deploy.`,
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**If prod is unhealthy, trigger Rollback (defaults to `lkg`).**',
              ].join('\n'),
              labels: ['release'],
            });

      - name: Ping Teams on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        with:
          script: |
            if (!process.env.TEAMS_WEBHOOK_URL) return;
            const sha = (process.env.TARGET_SHA || 'unknown').slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const text = `**🔴 Release failed (\`${sha}\`)**\n\nProd may be mid-deploy. Run: ${runUrl}\n\n**If prod is unhealthy, trigger Rollback (defaults to \`lkg\`).**`;
            const card = {
              type: 'message',
              attachments: [{
                contentType: 'application/vnd.microsoft.card.adaptive',
                content: {
                  type: 'AdaptiveCard', version: '1.4',
                  $schema: 'http://adaptivecards.io/schemas/adaptive-card.json',
                  body: [{ type: 'TextBlock', wrap: true, text }],
                },
              }],
            };
            const res = await fetch(process.env.TEAMS_WEBHOOK_URL, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card),
            });
            if (!res.ok) core.warning(`Teams failure POST failed: ${res.status}`);
