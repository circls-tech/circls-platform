name: Rollback

# Force-points `release` back to a prior SHA (default: the `lkg` tag) and pushes — Coolify
# redeploys the older image. Verifies health + smoke. Migration-honest: if the reverted range
# carried migrations, it warns loudly — code reverts but the schema stays FORWARD; the operator
# decides any DB action. The tool never auto-reverses a forward migration.
#
# SECURITY: the dispatch input + step outputs are passed via env: and read as shell/JS vars,
# never inlined into run:/script: source (command-injection avoidance) — same convention as
# release.yml.
# CONCURRENCY: shares `group: release-prod` with release.yml ON PURPOSE so a rollback and a
# release can never run at once (both push `release`). Keep the group name in sync.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA or tag to roll back to (blank = lkg)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

concurrency:
  group: release-prod
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    env:
      HEALTH_URL: 'https://api.circls.app/v1/health'
      PORTAL_URLS: 'https://admin.circls.app,https://partners.circls.app,https://circls.app'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Resolve rollback target
        id: target
        env:
          INPUT_REF: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          git fetch origin main release --tags
          REF="$INPUT_REF"
          if [ -z "$REF" ]; then REF=lkg; fi
          SHA=$(git rev-parse "$REF^{commit}")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Rollback target: $REF → $SHA"

      - name: Warn if the rollback crosses migrations
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          CUR=$(git rev-parse origin/release)
          echo "Rolling release from $CUR back to $TARGET_SHA"
          MIGS=$(node scripts/release/detect-migrations.mjs "$TARGET_SHA" "$CUR" || true)
          if [ -n "$MIGS" ]; then
            echo "::warning::Rollback crosses migrations — CODE reverts but SCHEMA stays FORWARD. Affected:"
            echo "$MIGS"
          else
            echo "No migrations between target and current release."
          fi

      - name: Force release back and push (triggers Coolify redeploy)
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          git push -f origin "$TARGET_SHA:refs/heads/release"

      - name: Verify — health build SHA + smoke probes
        env:
          EXPECTED_SHA: ${{ steps.target.outputs.sha }}
        run: node scripts/release/smoke.mjs

      - name: Report outcome
        if: always()
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const ok = process.env.JOB_STATUS === 'success';
            const sha = process.env.TARGET_SHA || 'unknown';
            const shortSha = sha === 'unknown' ? sha : sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `${ok ? '✅' : '🔴'} Rollback to ${shortSha} ${ok ? 'succeeded' : 'FAILED'}`,
              body: [
                `Rolled \`release\` to \`${sha}\`.`,
                ok ? '' : '**Prod may still be unhealthy — investigate immediately.**',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['release'],
            });
